<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Lion center care</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
<link href="ico.ico" rel="icon">

<style>

*{
  margin:0;
  padding:0;
}

body{
  background: linear-gradient(to right,rgb(223,209,196),#757575);
  color:#fff;
  text-align:center;
  justify-content: center;
  align-items: center;
}

nav{
 background: rgb(223,209,196);
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:20px 50px;
 position: relative;
 top:0;
 z-index:1000;
 font-size: larger;
}

nav img{
  transform: scale(4)translateX(10px);
}

nav a{
  color:black;
  text-decoration:none;
  margin:0 15px;
  transition:.3s;
}

nav a:hover{
  color:red;
}

.section {
  padding: 80px 20px;
  max-width: 1200px;
  margin: auto;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:50px;
}

.card{
 background:#727272;
 padding:20px;
 border-radius:15px;
 transition:.3s;
 width:fit-content;
 box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.card img{
  width:100%;
  border-radius:10px;
}

.hero-video {
  display: flex;
  justify-content: center;
  margin-top: 40px;
}

.hero-video video {
  width: 90%;
  max-width: 500px;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.hamburger {
  display: none;
  font-size: 30px;
  cursor: pointer;
}

@media (max-width: 768px) {

  nav {
    padding: 15px 20px;
  }

  .menu {
    position: absolute;
    top: 80px;
    right: 0;
    background: rgb(223,209,196);
    width: 100%;
    display: none;
    flex-direction: column;
    text-align: center;
  }

  .menu a {
    display: block;
    padding: 15px;
    border-top: 1px solid #ccc;
  }

  .menu.active {
    display: flex;
  }

  .hamburger {
    display: block;
  }
}

</style>
</head>

<body>

<nav>
  <img src="upscale.png" alt="The Lion center care" width="31" height="17">

  <div class="menu" id="menu">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>

  <div class="hamburger" onclick="toggleMenu()">
    ☰
  </div>
</nav>

<div class="hero-video">
  <video autoplay muted loop playsinline>
    <source src="video.mp4" type="video/mp4">
  </video>
</div>

<div class="section">
  <h2 data-aos="fade-up">Our Services</h2>
  <div class="cards">
    <div class="card" data-aos="fade-right" data-aos-offset="0" data-aos-anchor-placement="center-bottom">
      <h3>Haircut</h3>
      <img src="front.jpeg">
    </div>
    <div class="card" data-aos="fade-left" data-aos-offset="0" data-aos-anchor-placement="center-bottom">
      <h3>Moroccan bath</h3>
      <img src="bath.jpeg">
    </div>
  </div>
</div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init({
 duration:1000,
 once:true
});

function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
