<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Services</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
<style>
*{margin:0;padding:0;}
body{
  background: linear-gradient(to right,rgb(223,209,196),#757575);
  color:#000000;
}
nav{
 background: rgb(223,209,196);
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:20px 50px;
 position: relative;
 top:0;
 z-index:1000;
 font-size: larger;
}


nav img{
  transform: scale(4)translateX(10px);
}

nav a{
  color:black;
  text-decoration:none;
  margin:0 15px;
  transition:.3s;
}

nav a:hover{
  color:red;
}

.hamburger {
  display: none;
  font-size: 30px;
  cursor: pointer;
}

.container{padding:50px}
.service{margin-bottom:40px;display:flex;gap:20px;align-items:center}
.service img{width:500px;border-radius:15px}

@media (max-width: 768px) {

  nav {
    padding: 15px 20px;
  }

  .menu {
    position: absolute;
    top: 80px;
    right: 0;
    background: rgb(223,209,196);
    width: 100%;
    display: none;
    flex-direction: column;
    text-align: center;
  }

  .menu a {
    display: block;
    padding: 15px;
    border-top: 1px solid #ccc;
  }

  .menu.active {
    display: flex;
  }

  .hamburger {
    display: block;
  }
}
</style>
</head>
<body>

<nav>
  <img src="upscale.png" alt="The Lion center care" width="31" height="17">

  <div class="menu" id="menu">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>

  <div class="hamburger" onclick="toggleMenu()">
    ☰
  </div>
</nav>

<div class="container">
<h1 data-aos="fade-up">Our Services</h1>
<br>
<div class="service" data-aos="fade-right">
<img src="https://images.unsplash.com/photo-1503951914875-452162b0f3f1">
<div>
<h2>Haircut</h2>
<p>Modern fades and classic styles.</p>
</div>
</div>

<div class="service" data-aos="fade-left">
<img src="https://www.travel-exploration.com/images/Moroccan-Hammam-Spa-Travel-Exploration-Morocco.jpg">
<div>
<h2>Moroccan bath</h2>
<p>Exfoliating and softening the skin using warm steam.</p>
</div>
</div>

</div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init({duration:1000,once:true});
function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
}
</script>
</body>
</html>
